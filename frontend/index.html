<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BudgetX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-container">
    <div class="auth-left">
      <div class="floating-elements">
        <i class="fa-solid fa-coins coin"></i>
        <i class="fa-solid fa-dollar-sign coin"></i>
        <i class="fa-solid fa-euro-sign coin"></i>
        <i class="fa-solid fa-sterling-sign coin"></i>
      </div>
      <div class="auth-left-content">
        <h1 class="typewriter-text" id="typewriterText">Welcome Back.</h1>
        <p style="font-size: 1.2rem; opacity: 0.9;">Manage your finances with real-time insights.</p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-card glass-panel">
        <div class="auth-header">
          <h2>Sign In to BudgetX</h2>
          <p>Please enter your details to continue</p>
        </div>
        
        <form id="loginForm">
          <div class="input-group">
            <input type="email" id="email" class="input-field" placeholder=" " required>
            <label for="email" class="input-label">Email Address</label>
          </div>

          <div class="input-group">
            <input type="password" id="password" class="input-field" placeholder=" " required>
            <label for="password" class="input-label">Password</label>
            <i class="fa-regular fa-eye password-toggle" id="togglePassword"></i>
          </div>

          <div class="extra-links">
            <label class="checkbox-container">
              <input type="checkbox" id="rememberMe">
              <span>Remember me</span>
            </label>
            <a href="#" id="forgotPasswordLink">Forgot Password?</a>
          </div>

          <button type="submit" class="btn-primary auth-btn" id="loginBtn">
            <span class="btn-text">Sign In</span>
          </button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
      </div>
    </div>
  </div>

  <script src="./js/auth.js"></script>
</body>
</html>
